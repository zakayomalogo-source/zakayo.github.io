<!DOCTYPE html>
<html>
<head>
<title>Ingia — Zakayo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
min-height:100vh;
background:linear-gradient(135deg,#1a1a2e,#0f3460);
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}
.login-box {
background:rgba(15,52,96,0.9);
padding:40px;
border-radius:20px;
width:100%;
max-width:400px;
border:1px solid rgba(233,69,96,0.3);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:ingia 0.5s ease;
}
@keyframes ingia {
from { transform:translateY(-30px); opacity:0; }
to { transform:translateY(0); opacity:1; }
}
.logo {
text-align:center;
margin-bottom:30px;
}
.logo img {
width:80px;
height:80px;
border-radius:50%;
border:3px solid #e94560;
object-fit:cover;
margin-bottom:15px;
}
.logo h1 {
color:#e94560;
font-size:24px;
margin-bottom:5px;
}
.logo p {
color:#aaa;
font-size:14px;
}
.form-group {
margin-bottom:20px;
}
.form-group label {
display:block;
color:#aaa;
font-size:14px;
margin-bottom:8px;
}
.form-group .input-box {
position:relative;
}
.form-group .input-icon {
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:18px;
}
.form-group input {
width:100%;
padding:14px 15px 14px 45px;
border-radius:10px;
border:1px solid rgba(233,69,96,0.3);
background:rgba(26,26,46,0.8);
color:white;
font-size:16px;
transition:all 0.3s;
}
.form-group input:focus {
outline:none;
border-color:#e94560;
box-shadow:0 0 10px rgba(233,69,96,0.2);
}
.form-group input::placeholder { color:#555; }
.kionyeshe-nywila {
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
background:none;
border:none;
color:#aaa;
}
.kionyeshe-nywila:hover { color:#e94560; }
.btn-ingia {
width:100%;
padding:15px;
background:linear-gradient(135deg,#e94560,#c0392b);
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:all 0.3s;
margin-top:10px;
}
.btn-ingia:hover {
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(233,69,96,0.3);
}
.btn-ingia:active { transform:translateY(0); }
.ujumbe {
padding:12px 15px;
border-radius:10px;
margin:15px 0;
font-size:14px;
text-align:center;
display:none;
}
.ujumbe.kosa {
background:rgba(233,69,96,0.2);
border:1px solid #e94560;
color:#e94560;
}
.ujumbe.mafanikio {
background:rgba(39,174,96,0.2);
border:1px solid #27ae60;
color:#27ae60;
}
.viungo {
text-align:center;
margin-top:20px;
}
.viungo a {
color:#e94560;
text-decoration:none;
font-size:14px;
margin:0 10px;
}
.viungo a:hover { text-decoration:underline; }
.loading {
display:none;
text-align:center;
color:#aaa;
margin:10px 0;
}
.dots span {
animation:dot 1.4s infinite;
font-size:20px;
color:#e94560;
}
.dots span:nth-child(2) { animation-delay:0.2s; }
.dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes dot {
0%,80%,100% { opacity:0; }
40% { opacity:1; }
}
.mgawanyo {
display:flex;
align-items:center;
gap:15px;
margin:20px 0;
}
.mgawanyo::before, .mgawanyo::after {
content:'';
flex:1;
height:1px;
background:rgba(255,255,255,0.1);
}
.mgawanyo span { color:#aaa; font-size:13px; }
.btn-mgeni {
width:100%;
padding:12px;
background:transparent;
color:white;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:all 0.3s;
}
.btn-mgeni:hover {
background:rgba(255,255,255,0.1);
border-color:#e94560;
}
</style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <img src="IMG 1234.JPG" alt="Zakayo">
        <h1>Karibu Tena!</h1>
        <p>Ingia kwenye tovuti ya Zakayo</p>
    </div>

    <div class="ujumbe kosa" id="ujumbe-kosa"></div>
    <div class="ujumbe mafanikio" id="ujumbe-mafanikio"></div>

    <div class="form-group">
        <label>👤 Jina la Mtumiaji</label>
        <div class="input-box">
            <span class="input-icon">👤</span>
            <input type="text" id="username"
                placeholder="Andika jina lako"
                autocomplete="username">
        </div>
    </div>

    <div class="form-group">
        <label>🔒 Nywila</label>
        <div class="input-box">
            <span class="input-icon">🔒</span>
            <input type="password" id="password"
                placeholder="Andika nywila yako"
                autocomplete="current-password">
            <button class="kionyeshe-nywila"
                onclick="onyeshaNywila()"
                id="btn-nywila">👁️</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="dots">
            <span>●</span><span>●</span><span>●</span>
        </div>
    </div>

    <button class="btn-ingia" onclick="ingia()">
        🔐 Ingia
    </button>

    <div class="mgawanyo">
        <span>au</span>
    </div>

    <button class="btn-mgeni" onclick="ingiaKamaMgeni()">
        👀 Endelea Kama Mgeni
    </button>

    <div class="viungo">
        <a href="index.html">🏠 Nyumbani</a>
        <a href="contact.html">📧 Wasiliana</a>
    </div>
</div>

<script>
// Watumiaji waliohifadhiwa (demo)
var watumiaji = [
    { username: "zakayo", password: "Zakayo99", jina: "Zakayo Maloloi Malogo", role: "admin" },
    { username: "admin", password: "admin123", jina: "Administrator", role: "admin" },
    { username: "mgeni", password: "mgeni123", jina: "Mgeni", role: "user" }
];

function onyeshaNywila() {
    var input = document.getElementById("password");
    var btn = document.getElementById("btn-nywila");
    if (input.type === "password") {
        input.type = "text";
        btn.innerHTML = "🙈";
    } else {
        input.type = "password";
        btn.innerHTML = "👁️";
    }
}

function onyeshaUjumbe(aina, maandishi) {
    var kosa = document.getElementById("ujumbe-kosa");
    var mafanikio = document.getElementById("ujumbe-mafanikio");
    kosa.style.display = "none";
    mafanikio.style.display = "none";
    if (aina === "kosa") {
        kosa.innerHTML = maandishi;
        kosa.style.display = "block";
    } else {
        mafanikio.innerHTML = maandishi;
        mafanikio.style.display = "block";
    }
}

function ingia() {
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;
    var loading = document.getElementById("loading");

    if (!username || !password) {
        onyeshaUjumbe("kosa", "⚠️ Tafadhali jaza jina na nywila!");
        return;
    }

    loading.style.display = "block";

    setTimeout(function() {
        loading.style.display = "none";

        var mtumiaji = watumiaji.find(function(m) {
            return m.username === username && m.password === password;
        });

        if (mtumiaji) {
            localStorage.setItem("mtumiaji_ameingia", JSON.stringify({
                jina: mtumiaji.jina,
                username: mtumiaji.username,
                role: mtumiaji.role
            }));
            onyeshaUjumbe("mafanikio", "✅ Umeingia vizuri! Unakwenda nyumbani...");
            setTimeout(function() {
                window.location.href = "index.html";
            }, 1500);
        } else {
            onyeshaUjumbe("kosa", "❌ Jina au nywila si sahihi!");
            document.getElementById("password").value = "";
        }
    }, 1500);
}

function ingiaKamaMgeni() {
    localStorage.setItem("mtumiaji_ameingia", JSON.stringify({
        jina: "Mgeni",
        username: "mgeni",
        role: "guest"
    }));
    window.location.href = "index.html";
}

// Enter key
document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") ingia();
});

// Angalia kama tayari ameingia
var ameingia = localStorage.getItem("mtumiaji_ameingia");
if (ameingia) {
    window.location.href = "index.html";
}
</script>
</body>
</html>
