<!DOCTYPE html>
<html>
<head>
<title>Ingia — Zakayo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;font-family:Arial;}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;}
.particle{position:absolute;width:4px;height:4px;background:#e94560;border-radius:50%;animation:float linear infinite;opacity:0.5;}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.5;}90%{opacity:0.5;}100%{transform:translateY(-100px) rotate(720deg);opacity:0;}}
.login-container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}
.login-box{background:rgba(15,52,96,0.85);backdrop-filter:blur(20px);padding:40px;border-radius:25px;border:1px solid rgba(233,69,96,0.4);box-shadow:0 25px 50px rgba(0,0,0,0.5),0 0 100px rgba(233,69,96,0.1);animation:slideIn 0.6s ease;}
@keyframes slideIn{from{transform:translateY(-40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.logo{text-align:center;margin-bottom:35px;}
.logo img{width:90px;height:90px;border-radius:50%;border:3px solid #e94560;object-fit:cover;box-shadow:0 0 30px rgba(233,69,96,0.5);}
.logo h1{color:white;font-size:26px;margin:15px 0 5px;}
.logo p{color:#aaa;font-size:14px;}
.form-group{margin-bottom:20px;position:relative;}
.form-group label{display:block;color:#aaa;font-size:13px;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;z-index:1;}
.form-group input{width:100%;padding:14px 45px;border-radius:12px;border:1px solid rgba(233,69,96,0.3);background:rgba(26,26,46,0.8);color:white;font-size:16px;transition:all 0.3s;}
.form-group input:focus{outline:none;border-color:#e94560;box-shadow:0 0 20px rgba(233,69,96,0.2);background:rgba(26,26,46,1);}
.toggle-pass{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;color:#aaa;font-size:18px;transition:color 0.3s;}
.toggle-pass:hover{color:#e94560;}
.btn-login{width:100%;padding:16px;background:linear-gradient(135deg,#e94560,#c0392b);color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;transition:all 0.3s;letter-spacing:1px;margin-top:5px;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 15px 30px rgba(233,69,96,0.4);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.7;cursor:not-allowed;}
.msg{padding:12px 15px;border-radius:10px;margin:12px 0;font-size:14px;text-align:center;display:none;animation:fadeIn 0.3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.msg.error{background:rgba(233,69,96,0.15);border:1px solid #e94560;color:#e94560;display:block;}
.msg.success{background:rgba(39,174,96,0.15);border:1px solid #27ae60;color:#27ae60;display:block;}
.divider{display:flex;align-items:center;gap:15px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
.divider span{color:#555;font-size:13px;}
.btn-guest{width:100%;padding:13px;background:transparent;color:#aaa;border:1px solid rgba(255,255,255,0.15);border-radius:12px;font-size:15px;cursor:pointer;transition:all 0.3s;}
.btn-guest:hover{border-color:#e94560;color:white;background:rgba(233,69,96,0.1);}
.links{text-align:center;margin-top:20px;}
.links a{color:#e94560;text-decoration:none;font-size:13px;margin:0 10px;}
.links a:hover{text-decoration:underline;}
.security-badge{text-align:center;margin-top:15px;color:#555;font-size:12px;}
.loader{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-container">
<div class="login-box">
    <div class="logo">
        <img src="IMG 1234.JPG" alt="Zakayo">
        <h1>Karibu Tena!</h1>
        <p>Ingia kwenye tovuti ya Zakayo</p>
    </div>

    <div class="msg" id="msg"></div>

    <div class="form-group">
        <label>Jina la Mtumiaji</label>
        <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Andika jina lako" autocomplete="username">
        </div>
    </div>

    <div class="form-group">
        <label>Nywila</label>
        <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Andika nywila yako">
            <button class="toggle-pass" onclick="togglePass()">👁️</button>
        </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="ingia()">🔐 Ingia</button>

    <div class="divider"><span>au</span></div>

    <button class="btn-guest" onclick="ingiaKamaMgeni()">👀 Endelea Kama Mgeni</button>

    <div class="links">
        <a href="index.html">🏠 Nyumbani</a>
        <a href="contact.html">📧 Wasiliana</a>
    </div>

    <div class="security-badge">🔒 Tovuti hii inalindwa na usalama wa hali ya juu</div>
</div>
</div>

<script>
// Particles
var particles = document.getElementById("particles");
for(var i = 0; i < 20; i++){
    var p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "%";
    p.style.animationDuration = (Math.random()*10+5) + "s";
    p.style.animationDelay = (Math.random()*5) + "s";
    p.style.width = p.style.height = (Math.random()*4+2) + "px";
    particles.appendChild(p);
}

// Watumiaji
var watumiaji = [
    {username:"zakayo", password:"Zakayo99", jina:"Zakayo Maloloi Malogo", role:"admin"},
    {username:"admin", password:"Admin2026!", jina:"Administrator", role:"admin"}
];

// Kumbuka maingilio yaliyoshindwa
var majaribio_mabaya = parseInt(localStorage.getItem("majaribio_mabaya")||"0");
var muda_kuzuiwa = localStorage.getItem("muda_kuzuiwa");

function togglePass(){
    var inp = document.getElementById("password");
    inp.type = inp.type === "password" ? "text" : "password";
}

function onyeshaUjumbe(aina, maandishi){
    var el = document.getElementById("msg");
    el.className = "msg " + aina;
    el.innerHTML = maandishi;
}

async function tumiaFormspree(taarifa){
    try {
        await fetch("https://formspree.io/f/mojrddaz", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                _subject: "🔔 Mtu Ameingia Tovuti Yako!",
                jina_mtumiaji: taarifa.username,
                jina_kamili: taarifa.jina,
                aina: taarifa.role,
                wakati: new Date().toLocaleString("sw-TZ"),
                browser: navigator.userAgent.substring(0,50),
                hali: taarifa.hali
            })
        });
    } catch(e){ console.log("Taarifa haikutumwa"); }
}

async function ingia(){
    // Angalia kama amezuiwa
    if(muda_kuzuiwa && Date.now() < parseInt(muda_kuzuiwa)){
        var dakika = Math.ceil((parseInt(muda_kuzuiwa) - Date.now()) / 60000);
        onyeshaUjumbe("error", "🚫 Umezuiwa kwa dakika " + dakika + " kwa sababu ya majaribio mengi mabaya!");
        return;
    }

    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;
    var btn = document.getElementById("btn-login");

    if(!username || !password){
        onyeshaUjumbe("error", "⚠️ Tafadhali jaza jina na nywila!");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "<span class='loader'></span> Inaingia...";

    await new Promise(r => setTimeout(r, 1500));

    var mtumiaji = watumiaji.find(m => m.username === username && m.password === password);

    if(mtumiaji){
        // Ingia vizuri
        majaribio_mabaya = 0;
        localStorage.removeItem("majaribio_mabaya");
        localStorage.removeItem("muda_kuzuiwa");

        localStorage.setItem("mtumiaji_ameingia", JSON.stringify({
            jina: mtumiaji.jina,
            username: mtumiaji.username,
            role: mtumiaji.role,
            muda_wa_kuingia: new Date().toISOString()
        }));

        // Tuma taarifa kwa owner
        await tumiaFormspree({
            username: mtumiaji.username,
            jina: mtumiaji.jina,
            role: mtumiaji.role,
            hali: "✅ AMEINGIA VIZURI"
        });

        onyeshaUjumbe("success", "✅ Umeingia vizuri! Karibu " + mtumiaji.jina + "!");
        setTimeout(() => window.location.href = "index.html", 1500);

    } else {
        // Jaribio baya
        majaribio_mabaya++;
        localStorage.setItem("majaribio_mabaya", majaribio_mabaya);

        // Tuma taarifa kwa owner kuhusu jaribio baya
        await tumiaFormspree({
            username: username,
            jina: "HAIJULIKANI",
            role: "MGENI ASIYEJULIKANA",
            hali: "❌ JARIBIO BAYA #" + majaribio_mabaya
        });

        if(majaribio_mabaya >= 3){
            muda_kuzuiwa = Date.now() + (15 * 60 * 1000); // Zuia dakika 15
            localStorage.setItem("muda_kuzuiwa", muda_kuzuiwa);
            onyeshaUjumbe("error", "🚫 Umezuiwa kwa dakika 15! Majaribio 3 mabaya.");
        } else {
            onyeshaUjumbe("error", "❌ Jina au nywila si sahihi! Majaribio yaliyobaki: " + (3-majaribio_mabaya));
        }

        document.getElementById("password").value = "";
        btn.disabled = false;
        btn.innerHTML = "🔐 Ingia";
    }
}

function ingiaKamaMgeni(){
    localStorage.setItem("mtumiaji_ameingia", JSON.stringify({
        jina:"Mgeni", username:"mgeni", role:"guest",
        muda_wa_kuingia: new Date().toISOString()
    }));
    tumiaFormspree({username:"mgeni", jina:"Mgeni", role:"guest", hali:"👀 AMEINGIA KAMA MGENI"});
    window.location.href = "index.html";
}

document.addEventListener("keypress", e => { if(e.key==="Enter") ingia(); });

// Angalia kama tayari ameingia
if(localStorage.getItem("mtumiaji_ameingia")) window.location.href = "index.html";
</script>
</body>
</html>
